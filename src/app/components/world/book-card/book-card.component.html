<fl-ribbon [nzText]="ribbon_text" [nzColor]="getColor(book.status)">
  <a
    class="card"
    fl-flex
    [style.gap.px]="25"
    [ngClass]="hasNote(book) ? 'content' : 'no_content'"
    [href]="hasNote(book) ? book.content : null"
    target="_blank"
    (click)="handleClick($event, hasNote(book))"
  >
    <img
      loading="lazy"
      decoding="async"
      nz-image
      nzDisablePreview="true"
      [nzSrc]="book.img[0].url"
      alt=""
      [height]="125"
    >
    <div fl-flex fl-vertical="true" fl-justify="center" fl-gap="small" class="noto-sans-sc">
      <span nz-typography class="book_name">{{book.name}}</span>
      <span nz-typography class="book_author">{{book.author}}</span>
      @if (book.finishDate) {
        <span nz-typography nzType="secondary">读完于 {{book.finishDate | date:'yyyy-MM-dd'}}</span>
      }
    </div>
  </a>
</fl-ribbon>

<ng-template #ribbon_text>
  <div fl-flex class="noto-sans-sc" fl-justify="center">
    @if (book.readingTime > 0) {
      <span nz-typography class="ribbon_text">{{book.readingTime | number:'1.1'}} 小时</span>
    }
    @if (book.readingTime > 0) {
      <fl-divider nzType="vertical"></fl-divider>
    }
    <span nz-typography class="ribbon_text">{{book.status}}</span>
  </div>
</ng-template>
