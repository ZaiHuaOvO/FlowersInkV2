  <nav class="menu">
    <ul nz-flex nzGap="large" nzAlign="center" nzJustify="center">
      @for (item of MenuList; track item) {
        <li nz-flex nzAlign="center" nzJustify="center" class="menu-item"
          [class.active]="isActive(item.url) || isParentActive(item.URL)"
          [class.parent]="item.child?.length == 0"
          (mouseenter)="prefetchMenu(item)"
          (focusin)="prefetchMenu(item)">
          <a
            [routerLink]="item.url"
            class="menu-link"
            nz-dropdown
            [nzDropdownMenu]="menu"
            [nzTrigger]="'hover'"
            [nzPlacement]="'bottomCenter'"
          >
            <span nz-icon [nzType]="item.icon" nzTheme="outline"></span>
            &nbsp;
            {{ item.title }}
          </a>
          <nz-dropdown-menu #menu="nzDropdownMenu">
            <div nz-flex [nzVertical]="true" class="submenu" nzJustify="center" nzAlign="center"
              nzGap="middle">
              @for (sub of item.child; track sub) {
                <a [routerLink]="sub.url" class="submenu-item" flCard
                  [class.active]="isActive(sub.url)"
                  (mouseenter)="prefetchUrl(sub.url)"
                  (focusin)="prefetchUrl(sub.url)">{{
                sub.title }}</a>
              }
            </div>
          </nz-dropdown-menu>
        </li>
      }
    </ul>
  </nav>
</div>
<div class="avatar-slot" nz-flex nzJustify="center" nzAlign="center">
  <img width="48px" src="https://api.flowersink.com/img/再花猫猫女仆欢呼.GIF" alt="" loading="eager" decoding="async">
</div>
</div>
}

@if (isMobile) {
  <div class="header" nz-flex nzJustify="space-between" nzAlign="center" @QuickDown>
    <a class="mobile-menu-trigger" nz-dropdown (click)="mobileMenu()">
      <span nz-icon nzType="menu" nzTheme="outline"></span>
      &nbsp;
      导航
    </a>
    <img width="48px" src="https://api.flowersink.com/img/再花猫猫女仆欢呼.GIF" alt="" loading="eager" decoding="async">
  </div>
}

<ng-template #mobileMenuTitle>
  <span nz-typography class="mobile-menu-title">花墨导航</span>
</ng-template>
