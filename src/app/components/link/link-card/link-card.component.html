<a class="card content" fl-flex [style.gap.px]="25" fl-justify="start" fl-align="start" [href]="link.url" target="_blank">
    <img loading="lazy" decoding="async" [src]="link.logo" alt="" [height]="75">
    <div fl-flex fl-vertical="true" fl-justify="center" fl-gap="small" class="noto-sans-sc">
        <span nz-typography class="link_name">{{link.name}}</span>
        <span nz-typography class="link_description">{{link.description}}</span>
    </div>
</a>
