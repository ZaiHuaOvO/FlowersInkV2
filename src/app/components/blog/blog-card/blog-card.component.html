<a class="blog_card" nz-flex [nzGap]="'small'" nzAlign="start" nzJustify="center" [nzVertical]="true">
  @if (!loading) {
  <h4 nz-typography style="color:#8B4513"> {{blog.title}} </h4>
  <p nz-typography nzEllipsis [nzContent]="blog.content" [nzEllipsisRows]="2"></p>
  <div class="blog_msg" nz-flex nzAlign="center" nzJustify="space-between">
    <div nz-flex nzAlign="center" nzGap="small" class="blog_meta_group">
      <span nz-typography nzType="secondary" class="blog_meta_text">{{blog.type}} | {{blog.tag}} </span>
      <span nz-typography nzType="secondary" class="blog_meta_text"><span nz-icon nzType="eye" nzTheme="outline"></span>
        {{blog.views}} | </span>
      <span nz-typography nzType="secondary" class="blog_meta_text">{{ blog.date | date:'yyyy年MM月dd日'}}</span>
    </div>
    @if (!isMobile) {
    <div nz-flex nzJustify="end" nzGap="small" nzWrap="wrap" [ngStyle]="{width:isMobile?'200px':'400px'}">
      @for (item of emojiTags[blog.id]; track item) {
      @if (item.count > 0) {
      <nz-tag flTag flTagVariant="outline" nz-tooltip [nzTooltipTitle]="item.description">
        <span class="emoji">{{ emojiSymbol(item.key) }}</span>&nbsp;<span class="emoji_count">{{item.count}}</span>
      </nz-tag>
      }
      }
    </div>
    }
  </div>
  } @else {
  <nz-skeleton [nzActive]="loading"></nz-skeleton>
  }

</a>
