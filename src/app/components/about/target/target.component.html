<div class="target" fl-flex fl-vertical="true" style="gap: 10px;" role="navigation" aria-label="about-nav">
  @for (item of routeList; track item.url) {
    <a
      class="target-item"
      [routerLink]="item.url"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
      [attr.title]="item.title"
      [attr.aria-label]="item.title"
    >
      <span class="target-symbol" aria-hidden="true">{{ item.symbol }}</span>
      <span class="target-title">{{ item.title }}</span>
    </a>
  }
</div>
