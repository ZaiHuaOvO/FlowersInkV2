<nz-spin [nzTip]="'留言发布中'" [nzSpinning]="loading">
  <div nz-flex [nzVertical]="true" nzGap="small">
    <div>
      <div nz-flex nzAlign="start" [nzVertical]="true">
        <textarea nz-input flInput type="text" (focus)="showToolbar = true" [(ngModel)]="form.content"
          placeholder=""></textarea>

        @if (showToolbar && !isMobile) {
        <div class="toolbar" nz-flex nzJustify="space-between" nzGap="middle">
          <flower-emoji (emojiSelected)="onEmojiSelected($event)"></flower-emoji>
          <div class="toolbar-actions" nz-flex [nzVertical]="true" nzGap="small">
            <flower-simple-captcha scene="message" [disabled]="loading"></flower-simple-captcha>
            <div nz-flex nzJustify="end" nzGap="small">
              <nz-input-group [nzPrefix]="prefixTemplateUser" class="message-input-group message-input-group--desktop">
                <input type="text" [(ngModel)]="form.name" nz-input flInput placeholder="怎么称呼你？" />
              </nz-input-group>
              <ng-template #prefixTemplateUser><span nz-icon nzType="user"></span></ng-template>

              <nz-input-group [nzPrefix]="prefixTemplateCloud" class="message-input-group message-input-group--desktop">
                <input type="text" nz-input flInput [(ngModel)]="form.url" placeholder="若有个人网站可填写" />
              </nz-input-group>
              <ng-template #prefixTemplateCloud><span nz-icon nzType="cloud"></span></ng-template>

              <fl-button class="submit" [disabled]="loading" (click)="submit()">发布</fl-button>
            </div>
          </div>
        </div>
        }

        @if (showToolbar && isMobile) {
        <div class="toolbar" nz-flex [nzVertical]="true" nzGap="small">
          <flower-simple-captcha scene="message" [disabled]="loading"></flower-simple-captcha>
          <div nz-flex nzJustify="end" nzGap="small">
            <nz-input-group [nzPrefix]="prefixTemplateUser"
              class="message-input-group message-input-group--mobile-name">
              <input type="text" [(ngModel)]="form.name" nz-input flInput placeholder="称呼" />
            </nz-input-group>
            <ng-template #prefixTemplateUser><span nz-icon nzType="user"></span></ng-template>

            <nz-input-group [nzPrefix]="prefixTemplateCloud"
              class="message-input-group message-input-group--mobile-url">
              <input type="text" nz-input flInput [(ngModel)]="form.url" placeholder="个人网站地址(若有)" />
            </nz-input-group>
            <ng-template #prefixTemplateCloud><span nz-icon nzType="cloud"></span></ng-template>

            <fl-button class="submit" [disabled]="loading" (click)="submit()">发布</fl-button>
          </div>
        </div>
        }
      </div>
    </div>
  </div>
</nz-spin>

<ng-template #contanctMsg>
  <span>留言成功，再花可能正在火速赶来审核中</span><a (click)="msgModal()">「联系再花」</a>
</ng-template>
<ng-template #contanctContent>
  <div nz-typography>
    <ul>
      <li><span nz-icon nzType="qq" nzTheme="outline"></span>：<strong>446840401</strong></li>
      <li><span nz-icon nzType="wechat" nzTheme="outline"></span>：<strong>zaihua_huahua</strong></li>
      <li><span nz-icon nzType="mail" nzTheme="outline"></span>：<strong>{{ email }}</strong></li>
    </ul>
  </div>
</ng-template>
