<div class="welcome" nz-flex [nzVertical]="true" nzAlign="center">
  <div class="content archive-content" nz-flex nzGap="middle" nzJustify="start" nzAlign="center" [nzVertical]="true">
    <flower-blog-title [title]="'文归档'"></flower-blog-title>
    <div class="search" flCard nz-flex nzAlign="center" nzJustify="center" @QuickUp>
      <nz-input-group [nzSuffix]="suffixIconSearch">
        <input type="text" nz-input flInput placeholder="想要搜点儿什么?" [formControl]="searchControl" />
      </nz-input-group>
      <ng-template #suffixIconSearch>
        <span nz-icon nzType="search"></span>
      </ng-template>
    </div>
    <nz-spin class="archive-spin" [nzTip]="'归档正在努力赶来中'" [nzSpinning]="loading" @SlowUp>
      <div nz-flex nzAlign="center" [nzVertical]="true" nzGap="middle">
        @for (item of data; track item) {
          <div class="blog" flCard>
            <h2 nz-typography>{{item.year}}年</h2>
            <div class="fi-simple-timeline">
              @for (blog of item.data; track blog) {
                <div class="fi-simple-timeline-item">
                  <span class="fi-simple-timeline-dot"></span>
                  <div class="fi-simple-timeline-content">
                    <span class="fi-simple-timeline-date">{{ blog.date | date:'MM/dd' }}</span>
                    <a class="fi-simple-timeline-title" [class.is-starred]="blog.star" [href]="'/blog/blog-detail/' + blog.id">
                      @if (blog.star) {<span class="star-badge">[精选]</span>}
                      {{ blog.title }}
                    </a>
                  </div>
                </div>
              }
            </div>
          </div>
        }
      </div>
    </nz-spin>
  </div>
</div>
