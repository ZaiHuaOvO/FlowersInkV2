<div class="article" fl-flex fl-vertical="true" fl-align="center">
    <flower-blog-title [title]="'开发问题记录'"></flower-blog-title>
    @if (isMobile) {
    <div class="search card" @QuickUp>
        <nz-input-group [nzSuffix]="suffixIconSearch">
            <input type="text" nz-input placeholder="搜索问题" [formControl]="searchControl" />
        </nz-input-group>
        <ng-template #suffixIconSearch>
            <span nz-icon nzType="search"></span>
        </ng-template>
    </div>
    }
    <div class="content" fl-flex fl-justify="center" fl-align="start" fl-gap="middle"
        [ngStyle]="{'width':isMobile ?'100%':'80%'}">
        <nz-spin [nzTip]="'问题正在努力赶来中'" [nzSpinning]="loading" [ngStyle]="{'width':isMobile ?'90vw':'auto'}">
            <nz-collapse [ngStyle]="{'width':isMobile ?'100%':'60vw'}" nzAccordion nzGhost nzBordered="false" fl-flex
                fl-gap="small" fl-vertical="true" @QuickUp>
                @for (panel of data; track panel) {
                <nz-collapse-panel [nzHeader]="titleBox" class="anwser card" nzShowArrow="false">
                    <markdown style="max-width: 100%; width: 100%;" id="currentAnchor" [data]="panel.content" clipboard></markdown>
                </nz-collapse-panel>
                <ng-template #titleBox>
                    <div fl-flex fl-justify="space-between">
                        <div fl-flex style="margin-left: 20px;">
                            <span nz-typography>{{panel.title}}</span>
                            <fl-divider nzType="vertical"></fl-divider>
                            <span nz-typography nzType="secondary">{{panel.tag}}</span>
                        </div>
                        <span nz-typography nzType="secondary">{{panel.date | date:'yyyy年MM月dd日'}}</span>
                    </div>
                </ng-template>
                }
            </nz-collapse>
            <nz-pagination [nzPageIndex]="page" [nzTotal]="count" [nzHideOnSinglePage]="true"
                (nzPageIndexChange)="pageChange($event)"></nz-pagination>
        </nz-spin>
        @if (!isMobile) {
        <div class="me" @SlowUp>
            <nz-affix [nzOffsetTop]="72">
                <div class="search card" fl-flex fl-align="center" fl-justify="start" fl-vertical="true" style="gap: 12px;">
                    <nz-input-group [nzSuffix]="suffixIconSearch">
                        <input type="text" nz-input placeholder="搜索问题" [formControl]="searchControl" />
                    </nz-input-group>
                    <ng-template #suffixIconSearch>
                        <span nz-icon nzType="search"></span>
                    </ng-template>
                    <div class="tag" fl-flex fl-align="start" fl-justify="start" fl-vertical="true">
                        <h5 nz-typography>问题标签</h5>
                        <div fl-flex fl-wrap="wrap" fl-gap="small">
                            @for (tag of tagList; track tag) {
                            <fl-tag [nzColor]="tag.color"
                                (click)="tagSelect(tag.tag)">{{tag.tag}}&nbsp;{{tag.count}}个</fl-tag>
                            }
                        </div>
                    </div>
                </div>
            </nz-affix>
        </div>
        }
    </div>
</div>
